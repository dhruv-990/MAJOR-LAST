apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: outage-sense
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      component: frontend
  template:
    metadata:
      labels:
        app: outage-sense
        component: frontend
    spec:
      containers:
        - name: frontend
          image: outage-sense-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  type: LoadBalancer
  selector:
    component: frontend
  ports:
    - port: 80
      targetPort: 80
