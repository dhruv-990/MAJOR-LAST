apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
  labels:
    app: outage-sense
    component: node-exporter
spec:
  selector:
    matchLabels:
      component: node-exporter
  template:
    metadata:
      labels:
        app: outage-sense
        component: node-exporter
    spec:
      containers:
        - name: node-exporter
          image: prom/node-exporter:latest
          ports:
            - containerPort: 9100
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: node-exporter
spec:
  type: ClusterIP
  selector:
    component: node-exporter
  ports:
    - port: 9100
      targetPort: 9100
